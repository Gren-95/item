services:
  app:
    container_name: item
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3000"
      - "443:443"
    environment:
      - DATABASE_HOST=${MYSQL_HOST}
      - DATABASE_PORT=${MYSQL_PORT}
      - DATABASE_USER=root
      - DATABASE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DATABASE_NAME=${MYSQL_DATABASE}
      - BARTENDER_HOST=${BARTENDER_HOST}
      - AUTH_ENDPOINT=${AUTH_ENDPOINT}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - HTTPS_CERT_FILE=${HTTPS_CERT_FILE}
      - HTTPS_KEY_FILE=${HTTPS_KEY_FILE}
      - HTTPS_PORT=${HTTPS_PORT}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DELL_CLIENT_ID=${DELL_CLIENT_ID}
      - DELL_CLIENT_SECRET=${DELL_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      # Allow writing generated certs from inside the container when running the cert script
      - ./certs:/app/certs
      # Database exports directory - mounted to /tmp/db-exports in container
      - ./tmp/db-exports:/tmp/db-exports
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: ${MYSQL_HOST}
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - db
    restart: unless-stopped

volumes:
  mysql_data:
