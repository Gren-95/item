name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            cd ${{ secrets.DEPLOY_PATH }}

            # Remember current package.json hash to detect dependency changes
            OLD_PKG_HASH=$(md5sum package.json 2>/dev/null | cut -d' ' -f1 || echo "none")

            echo "📥 Pulling latest changes..."
            git fetch origin main
            git reset --hard origin/main

            echo "📝 Writing version file..."
            git rev-parse --short HEAD > VERSION

            NEW_PKG_HASH=$(md5sum package.json | cut -d' ' -f1)

            if [ "$OLD_PKG_HASH" != "$NEW_PKG_HASH" ]; then
              echo "📦 Dependencies changed — installing..."
              docker exec item bun install
            fi

            echo "🎨 Rebuilding CSS..."
            docker exec item bun run build:css

            echo "🔄 Restarting app..."
            docker compose restart app

            echo "⏳ Waiting for app to start..."
            sleep 10

            echo "🏥 Health check..."
            for i in 1 2 3 4 5; do
              STATUS=$(curl -sk https://localhost/health 2>/dev/null | grep -o '"status":"[^"]*"' | head -1 || true)
              if [ -z "$STATUS" ]; then
                STATUS=$(curl -sf http://localhost/health 2>/dev/null | grep -o '"status":"[^"]*"' | head -1 || true)
              fi
              if echo "$STATUS" | grep -q "healthy"; then
                echo "✅ Deploy successful!"
                curl -sk https://localhost/api/version 2>/dev/null || curl -sf http://localhost/api/version 2>/dev/null
                echo ""
                exit 0
              fi
              echo "  Attempt $i/5 - waiting..."
              sleep 5
            done

            echo "❌ Health check failed after deploy"
            docker compose logs --tail=50 app
            exit 1

      - name: Verify deployment
        if: success()
        run: |
          sleep 5
          VERSION=$(curl -sf http://${{ secrets.SSH_HOST }}:50011/api/version 2>/dev/null || echo "Could not reach version endpoint")
          echo "🚀 Deployed version: $VERSION"
